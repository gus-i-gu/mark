name: Bug report
description: Report a reproducible problem in Markei
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: "Please remove all personal household data, receipts, credentials, and private paths before submitting."
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: Commit SHA, beta version, or branch
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Operating system, runtime, device, and installation method.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: "1. Open...\n2. Select...\n3. Observe..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized logs or evidence
      description: Do not include real purchase records or personal information.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched for an existing issue describing this problem.
          required: true
        - label: I removed private household data and credentials.
          required: true
