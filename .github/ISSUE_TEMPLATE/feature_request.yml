name: Feature proposal
description: Propose a bounded improvement to Markei
title: "[Proposal]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Describe the household, analytical, operational, or development need before describing a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the smallest useful change.
    validations:
      required: true
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and data effects
      description: State whether this changes local storage, synchronization, external contribution, or partner access.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Motivation or evidence
      description: Examples, user need, comparison, or research supporting the proposal.
  - type: textarea
    id: exclusions
    attributes:
      label: Explicit non-goals
      description: Identify nearby work that should remain outside this proposal.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This proposal does not require disclosure of private household data.
          required: true
